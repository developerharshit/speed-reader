<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA manifest is injected automatically by VitePWA with the correct base path -->

    <!-- ── Favicons ──────────────────────────────────────────────────── -->
    <!-- SVG favicon (Chrome, Firefox, Safari 14+) -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- ICO fallback (IE, legacy browsers) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <!-- ── Apple Touch Icons (iOS / iPadOS home-screen) ─────────────── -->
    <!-- Sizes ordered from largest to smallest so browsers pick the best fit -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/apple-touch-icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/apple-touch-icon-114x114.png" />
    <link rel="apple-touch-icon" sizes="76x76"   href="/apple-touch-icon-76x76.png" />
    <link rel="apple-touch-icon" sizes="72x72"   href="/apple-touch-icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="60x60"   href="/apple-touch-icon-60x60.png" />
    <link rel="apple-touch-icon" sizes="57x57"   href="/apple-touch-icon-57x57.png" />

    <!-- ── PWA / Android appearance ─────────────────────────────────── -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="RSVP Speed Reading – read PDF & EPUB books at lightning speed" />

    <!-- iOS standalone mode (full-screen, no Safari chrome) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SpeedRead" />

    <!-- Android standalone mode -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Windows / Microsoft Edge tile ────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#7c3aed" />
    <meta name="msapplication-TileImage" content="/pwa-144x144.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Speed Reader</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
