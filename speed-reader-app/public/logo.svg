<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep purple gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background — required for maskable/adaptive icons on Android -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Soft shadow under book -->
  <ellipse cx="256" cy="392" rx="148" ry="13" fill="#1e0754" opacity="0.32"/>

  <!-- ── LEFT PAGE (already-read side, slightly muted lavender) ── -->
  <path d="M100,182 Q100,160 122,158 L248,163 L248,378 L122,384 Q100,385 100,363 Z" fill="#ede9fe"/>

  <!-- ── RIGHT PAGE (current reading page, bright white) ── -->
  <path d="M264,163 L390,158 Q412,160 412,182 L412,363 Q412,385 390,384 L264,378 Z" fill="#ffffff"/>

  <!-- Book spine / center-fold depth -->
  <path d="M248,163 Q256,198 256,270 Q256,344 248,378 L264,378 Q256,344 256,270 Q256,198 264,163 Z" fill="#1e0754" opacity="0.14"/>

  <!-- ── LEFT PAGE: 6 faint text lines (content already read) ── -->
  <rect x="118" y="200" width="112" height="11" rx="5.5" fill="#7c3aed" opacity="0.13"/>
  <rect x="118" y="226" width="104" height="11" rx="5.5" fill="#7c3aed" opacity="0.13"/>
  <rect x="118" y="252" width="110" height="11" rx="5.5" fill="#7c3aed" opacity="0.13"/>
  <rect x="118" y="278" width="102" height="11" rx="5.5" fill="#7c3aed" opacity="0.13"/>
  <rect x="118" y="304" width="108" height="11" rx="5.5" fill="#7c3aed" opacity="0.13"/>
  <rect x="118" y="330" width="96"  height="11" rx="5.5" fill="#7c3aed" opacity="0.13"/>

  <!-- ── RIGHT PAGE: text lines ── -->
  <rect x="278" y="200" width="116" height="11" rx="5.5" fill="#7c3aed" opacity="0.17"/>
  <rect x="278" y="226" width="110" height="11" rx="5.5" fill="#7c3aed" opacity="0.17"/>

  <!-- ★  RSVP FOCAL-WORD HIGHLIGHT — the app's signature amber bar ★ -->
  <rect x="278" y="248" width="118" height="30" rx="8" fill="#f59e0b"/>
  <!-- Darker amber overlay: the single focal-point letter -->
  <rect x="330" y="248" width="26"  height="30" rx="5" fill="#d97706"/>
  <!-- Simulated word halves left/right of the focal letter -->
  <rect x="282" y="257" width="42"  height="12" rx="6" fill="rgba(255,255,255,0.82)"/>
  <rect x="362" y="257" width="30"  height="12" rx="6" fill="rgba(255,255,255,0.82)"/>

  <!-- More right page lines below the highlight -->
  <rect x="278" y="294" width="114" height="11" rx="5.5" fill="#7c3aed" opacity="0.17"/>
  <rect x="278" y="320" width="108" height="11" rx="5.5" fill="#7c3aed" opacity="0.17"/>
  <rect x="278" y="346" width="102" height="11" rx="5.5" fill="#7c3aed" opacity="0.17"/>
  <rect x="278" y="372" width="88"  height="11" rx="5.5" fill="#7c3aed" opacity="0.17"/>
</svg>
