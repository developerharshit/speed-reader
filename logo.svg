<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed background — required for maskable/adaptive icons on Android -->
  <rect width="512" height="512" fill="#7c3aed"/>

  <!-- Open book icon with reading speed lines -->
  <g transform="translate(60, 80) scale(3.2)">
    <!-- Left page -->
    <path d="M20 15 L20 95 Q30 100 40 95 L40 15 Z" fill="white" opacity="0.9"/>

    <!-- Right page -->
    <path d="M40 15 L40 95 Q50 100 60 95 L60 15 Z" fill="white"/>

    <!-- Left page lines (reading content) -->
    <line x1="24" y1="30" x2="36" y2="30" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="40" x2="36" y2="40" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="50" x2="36" y2="50" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="60" x2="36" y2="60" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="70" x2="32" y2="70" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>

    <!-- Right page lines -->
    <line x1="44" y1="30" x2="56" y2="30" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="40" x2="56" y2="40" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="50" x2="56" y2="50" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="60" x2="56" y2="60" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="70" x2="52" y2="70" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
