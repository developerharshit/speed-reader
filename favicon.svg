<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Purple background with slight rounding (matches app brand) -->
  <rect width="32" height="32" rx="5" fill="#7c3aed"/>

  <!-- Left page (lavender — already-read) -->
  <path d="M3,7 Q3,5.5 4.5,5.5 L14.5,6 L14.5,26.5 L4.5,27 Q3,27 3,25.5 Z" fill="#ede9fe"/>

  <!-- Right page (white — current reading page) -->
  <path d="M17.5,6 L27.5,5.5 Q29,5.5 29,7 L29,25.5 Q29,27 27.5,27 L17.5,26.5 Z" fill="#ffffff"/>

  <!-- Spine shadow -->
  <path d="M14.5,6 Q16,9 16,16 Q16,23 14.5,26.5 L17.5,26.5 Q16,23 16,16 Q16,9 17.5,6 Z" fill="#1e0754" opacity="0.12"/>

  <!-- RSVP focal-word highlight (amber bar — most recognizable element at tiny sizes) -->
  <rect x="18" y="12" width="9.5" height="5" rx="1.5" fill="#f59e0b"/>

  <!-- Focal letter accent (darker amber) -->
  <rect x="21.5" y="12" width="2.5" height="5" rx="1" fill="#d97706"/>
</svg>